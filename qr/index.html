<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>QR Generator</title>
    <link rel="icon" href="/assets/images/qr.webp" />
    <link rel="stylesheet" href="qr_code_styles.css">
    <script type="module" src="qr_code_script.js"></script>
    <script type="module" src="language_script.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js?59"></script>
    <script defer src="https://cloud.umami.is/script.js"
        data-website-id="c402e13d-03fd-44e1-8f98-5f343520c35a"></script>
</head>

<body>
    <h1 data-key="title">QR Code Generator</h1>

    <div class="wrap">
        <input id="text" data-key="placeholder" data-attr="placeholder"
            placeholder="Type the thing to turn into a QR code here" autocomplete="off" />
        <img id="qrImg" alt="QR code" width="256" height="256" />
        <p class="hint" data-key="hint">Right-click / long-press to save. Or:</p>

        <div class="buttons">
            <button id="savePNG" data-key="savePNG">Save as Photo (PNG)</button>
            <button id="saveSVG" data-key="saveSVG">Save as SVG</button>
        </div>
    </div>
</body>

</html>
